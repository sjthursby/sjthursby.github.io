# About Section
about_profile_image: images/profile.jpg
about_content: |
  I’m Sara-Jayne Thursby, PhD, a lead bioinformatician and postdoctoral fellow working at the intersection of epigenomics, biostatistics, and computational oncology.

  My research focuses on DNA methylation, multi-omics integration, and early cancer detection, with experience spanning organoid models, machine learning, and cfDNA biomarker development.

  I enjoy turning complex biological data into clear, useful insights and have developed published tools for methylation analysis, led collaborative projects from data processing through interpretation, and helped solve difficult computational and infrastructure challenges along the way.

  I’m especially interested in work that brings computation and biology together to make research more translational and impactful.

