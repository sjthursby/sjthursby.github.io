 - title: Experience # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: Johns Hopkins University
        caption: 2020 - Present
        sub_title: Postdoctoral Fellowship
        quote: >
          My postdoc has focused on building and applying robust epigenomic and multi‑omics methods to turn noisy DNA methylation data into clinically useful insights for early cancer detection and tumor biology.
        description: | # this will include new lines to allow paragraphs
          During my postdoctoral fellowship (2020–present), I have led multi-omics and epigenomics analyses across 15+ cancer projects, co-developing the OutlierMeth R package and publishing work on CRC CIMP/CEMP subtypes, and CDX2/BRAFV600E organoid models (EPIC, ATAC-seq, ChIP-seq, RNA-seq). I created the Epigenetic Instability Index (EII; first author, patent-pending cfDNA classifier, R01 co-I) and currently serve as lead bioinformatician on two manuscripts in preparation (BRAFV600E organoid clonal evolution and EOCRC vs LOCRC field effects).
          
  - title: Education # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: Ulster University
        link: https://www.ulster.ac.uk/research/topic/biomedical-sciences/research/centre-for-genomic-medicine
        # link_text: boringcompany.com
        sub_title: PhD Researcher
        caption: Oct. 2016 - June 2020
        quote: >
          Thesis: “Bioinformatic analysis of epigenetic effects, particularly changes in DNA methylation, following different interventions.”
        description: | # this will include new lines to allow paragraphs
            During my PhD (2016–2020), I built expertise in DNA methylation array analysis through studies in DNMT1 depletion, folic acid supplementation in pregnancy, and depression-related methylation in saliva, contributing to published work on differential methylation, immune-cell correction, enrichment analysis, and biological interpretation. I also developed CandiMeth, a Galaxy workflow that helps non-bioinformaticians explore candidate-gene methylation results without coding.

